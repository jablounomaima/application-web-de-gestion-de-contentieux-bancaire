<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier Prestataire</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
        .container { max-width: 640px; margin: 32px auto; background: white; border-radius: 10px; padding: 28px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        h1 { font-size: 20px; margin-bottom: 24px; color: #1e3a5f; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
        label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #334155; }
        input, select { padding: 9px 12px; border: 1.5px solid #cbd5e1; border-radius: 7px; font-size: 13.5px; outline: none; }
        input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .readonly-field { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }
        small { font-size: 11px; color: #94a3b8; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #2563eb; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin: 20px 0 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .btn-group { display: flex; gap: 10px; margin-top: 24px; }
        .btn { padding: 9px 20px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary   { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }
        .btn-secondary:hover { background: #e2e8f0; }
    </style>
</head>
<body>
<div class="container">
    <h1>✏️ Modifier Prestataire</h1>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:object="${prestataire}" 
          th:action="@{/agent/prestataires/{id}/edit(id=${prestataire.id})}" 
          method="post">

        <!-- CSRF - Version ultra-stable (Spring Security l'ajoute automatiquement) -->
        <input type="hidden" name="_csrf" th:value="${_csrf?.token}" />

        <!-- Champs en lecture seule -->
        <div class="form-row">
            <div class="form-group">
                <label>Type</label>
                <input type="text" th:value="${prestataire.typePrestataire}" 
                       class="readonly-field" readonly/>
                <small>Non modifiable</small>
            </div>
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" th:value="${prestataire.username}" 
                       class="readonly-field" readonly/>
                <small>Non modifiable</small>
            </div>
        </div>

        <div class="section-title">Informations personnelles</div>

        <div class="form-row">
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" th:field="*{nom}" required/>
            </div>
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" th:field="*{prenom}" required/>
            </div>
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email" th:field="*{email}" required/>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" th:field="*{telephone}"/>
            </div>
            <div class="form-group">
                <label>N° Carte professionnelle</label>
                <input type="text" th:field="*{numeroCartePro}"/>
            </div>
        </div>

        <div class="form-group">
            <label>Adresse</label>
            <input type="text" th:field="*{adresse}"/>
        </div>

        <div class="form-group">
            <label>Spécialité</label>
            <input type="text" th:field="*{specialite}"/>
        </div>

        <!-- Champs validateurs -->
        <div th:if="${prestataire.typePrestataire?.name() == 'VALIDATEUR_FINANCIER' 
                   or prestataire.typePrestataire?.name() == 'VALIDATEUR_JURIDIQUE'}">
            <div class="section-title">Paramètres de validation</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Niveau de validation</label>
                    <select th:field="*{niveauValidation}">
                        <option value="">-- Choisir --</option>
                        <option value="NIVEAU_1">Niveau 1</option>
                        <option value="NIVEAU_2">Niveau 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Plafond de validation (DZD)</label>
                    <input type="number" th:field="*{plafondValidation}" min="0" step="1000"/>
                </div>
            </div>
        </div>

        <!-- Type caché -->
        <input type="hidden" th:field="*{typePrestataire}" />

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 Enregistrer les modifications</button>
            <a th:href="@{/agent/prestataires}" class="btn btn-secondary">❌ Annuler</a>
        </div>
    </form>
</div>
</body>
</html>
