<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Prestataire</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #667eea; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; text-align: center; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 20px; }
        #validateurFields { display: none; border-top: 1px solid #eee; padding-top: 16px; margin-top: 8px; }
    </style>
</head>
<body>
   
    <div class="container">
        <h1>➕ Nouveau Prestataire</h1>
    
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    
        <form th:action="@{/agent/prestataires/create}" method="post" th:object="${nouveauPrestataire}">
    
            <!-- CSRF géré automatiquement par Spring Security + Thymeleaf -->
            <!-- Plus besoin de ligne manuelle qui causait l'erreur -->

            <!-- Type de Prestataire -->
            <div class="form-group">
                <label for="typePrestataire">Type de prestataire *</label>
                <select id="typePrestataire" th:field="*{typePrestataire}" required>
                    <option value="">-- Choisir un type --</option>
                    <option th:each="t : ${typesPrestataire}"
                            th:value="${t.name}"
                            th:text="${t.name}">
                    </option>
                </select>
            </div>
    
            <!-- Nom d'utilisateur -->
            <div class="form-group">
                <label for="username">Nom d'utilisateur *</label>
                <input type="text" id="username" th:field="*{username}" required
                       placeholder="ex: dupont.avocat"/>
            </div>

            <!-- Adresse -->
<div class="form-group">
    <label for="adresse">Adresse</label>
    <input type="text" id="adresse" th:field="*{adresse}" placeholder="Ex: 12 Rue de Tunis, Tunis"/>
</div>
    
            <!-- Mot de passe temporaire -->
            <div class="form-group">
                <label for="motDePasse">Mot de passe temporaire</label>
                <input type="password" id="motDePasse" th:field="*{motDePasse}"
                       placeholder="Laissez vide pour générer automatiquement"/>
            </div>
    
            <!-- Prénom -->
            <div class="form-group">
                <label for="prenom">Prénom *</label>
                <input type="text" id="prenom" th:field="*{prenom}" required/>
            </div>
    
            <!-- Nom -->
            <div class="form-group">
                <label for="nom">Nom *</label>
                <input type="text" id="nom" th:field="*{nom}" required/>
            </div>
    
            <!-- Email -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" th:field="*{email}" required/>
            </div>
    
            <!-- Téléphone -->
            <div class="form-group">
                <label for="telephone">Téléphone</label>
                <input type="tel" id="telephone" th:field="*{telephone}"
                       placeholder="0555 XX XX XX"/>
            </div>
    
            <!-- Spécialité -->
            <div class="form-group">
                <label for="specialite">Spécialité</label>
                <input type="text" id="specialite" th:field="*{specialite}"
                       placeholder="Ex: Droit bancaire, Immobilier..."/>
            </div>
    
            <!-- Numéro carte pro -->
            <div class="form-group">
                <label for="numeroCartePro">Numéro carte professionnelle</label>
                <input type="text" id="numeroCartePro" th:field="*{numeroCartePro}"/>
            </div>
    
            <!-- Champs pour validateurs -->
            <div id="validateurFields">
                <div class="form-group">
                    <label for="niveauValidation">Niveau de validation</label>
                    <select id="niveauValidation" th:field="*{niveauValidation}">
                        <option value="">-- Choisir --</option>
                        <option value="NIVEAU_1">Niveau 1</option>
                        <option value="NIVEAU_2">Niveau 2</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="plafondValidation">Plafond de validation (DZD)</label>
                    <input type="number" id="plafondValidation" th:field="*{plafondValidation}"
                           placeholder="50000" min="0" step="1000"/>
                </div>
                
            </div>
    
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">💾 Créer le Prestataire</button>
                <a th:href="@{/agent/prestataires}" class="btn btn-secondary">❌ Annuler</a>
            </div>
        </form>
    </div>

    <!-- Script pour afficher/masquer les champs validateurs selon le type -->
    <script>
        document.getElementById('typePrestataire').addEventListener('change', function() {
            const validateurFields = document.getElementById('validateurFields');
            if (this.value === 'VALIDATEUR') {
                validateurFields.style.display = 'block';
            } else {
                validateurFields.style.display = 'none';
            }
        });
    </script>
    
</body>
</html>
