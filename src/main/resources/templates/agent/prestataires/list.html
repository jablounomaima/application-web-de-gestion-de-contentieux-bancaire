<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Prestataires</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
        .header { background: #1e3a5f; color: white; padding: 16px 24px; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .nav a { padding: 7px 14px; border-radius: 6px; text-decoration: none; background: #fff; border: 1px solid #ddd; font-size: 13px; color: #334155; }
        .nav a:hover, .nav a.active { background: #2563eb; color: white; border-color: #2563eb; }
        .btn-create { background: #2563eb !important; color: white !important; border-color: #2563eb !important; margin-left: auto; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; font-size: 13.5px; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #f8fafc; padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #94a3b8; border-bottom: 1px solid #e2e8f0; }
        tbody td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }
        .badge { display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-blue   { background: #dbeafe; color: #1d4ed8; }
        .badge-amber  { background: #fef3c7; color: #92400e; }
        .badge-purple { background: #ede9fe; color: #5b21b6; }
        .badge-cyan   { background: #cffafe; color: #0e7490; }
        .badge-green  { background: #d1fae5; color: #065f46; }
        .badge-muted  { background: #f1f5f9; color: #94a3b8; }
        .actions { display: flex; gap: 5px; align-items: center; }
        .btn { display: inline-flex; align-items: center; padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; font-family: Arial, sans-serif; }
        .btn-edit   { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .btn-delete { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .btn-on  { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .btn-off { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }
        .empty { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header"><h1>👥 Gestion des Prestataires</h1></div>

    <div class="container">
        <div class="nav">
            <a th:href="@{/agent/dashboard}">← Dashboard</a>
            <a th:href="@{/agent/prestataires}" class="active">Tous</a>
            <a th:href="@{/agent/prestataires/create}" class="btn-create">+ Nouveau prestataire</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Spécialité</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${prestataires}">

                        <!-- Type -->
                        <td>
                            <span class="badge"
                                  th:classappend="${
                                      p.type.name() == 'AVOCAT'               ? 'badge-blue'   :
                                      p.type.name() == 'HUISSIER'             ? 'badge-amber'  :
                                      p.type.name() == 'EXPERT'               ? 'badge-purple' :
                                      p.type.name() == 'VALIDATEUR_JURIDIQUE' ? 'badge-cyan'   :
                                      'badge-green'}"
                                  th:text="${p.type.getLibelle()}">TYPE</span>
                        </td>

                        <!-- ✅ Syntaxe correcte pour concaténer deux champs -->
                        <td th:text="${p.nom + ' ' + p.prenom}">Nom</td>
                        <td th:text="${p.email}">email</td>
                        <td th:text="${p.telephone ?: '-'}">tel</td>
                        <td th:text="${p.specialite ?: '-'}">spec</td>

                        <!-- Statut -->
                        <td>
                            <span th:class="'badge ' + (${p.actif} ? 'badge-green' : 'badge-muted')"
                                  th:text="${p.actif ? 'Actif' : 'Inactif'}">statut</span>
                        </td>

                        <!-- Actions -->
                        <td>
                            <div class="actions">

                                <!-- Éditer -->
                                <a th:href="@{/agent/prestataires/{id}/edit(id=${p.id})}"
                                   class="btn btn-edit">✏️ Éditer</a>

                                <!-- ✅ DELETE via POST (pas GET) -->
                                <form th:action="@{/agent/prestataires/{id}/delete(id=${p.id})}"
                                      method="post" style="display:inline"
                                      onsubmit="return confirm('Supprimer ce prestataire ?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-delete">🗑️ Supprimer</button>
                                </form>

                                <!-- Toggle actif/inactif -->
                                <form th:action="@{/agent/prestataires/{id}/toggle(id=${p.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            th:class="'btn ' + (${p.actif} ? 'btn-off' : 'btn-on')"
                                            th:text="${p.actif ? 'Désactiver' : 'Activer'}">Toggle</button>
                                </form>

                            </div>
                        </td>
                    </tr>

                    <!-- Ligne vide -->
                    <tr th:if="${prestataires.isEmpty()}">
                        <td colspan="7" class="empty">
                            <div style="font-size:28px;margin-bottom:8px">🤝</div>
                            <div style="font-weight:500">Aucun prestataire pour le moment</div>
                            <div style="font-size:12px;margin-top:4px">
                                <a th:href="@{/agent/prestataires/create}">Ajouter un prestataire</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
