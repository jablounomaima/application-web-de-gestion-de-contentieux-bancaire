<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Changer mon mot de passe</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f5f5f5; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            border-color: #667eea;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Changer mon mot de passe</h1>
        
        <!-- Messages -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        
        <form th:action="@{/agent/change-password}" method="post" th:object="${passwordChange}">
            <div class="form-group">
                <label for="currentPassword">Mot de passe actuel</label>
                <input type="password" 
                       id="currentPassword" 
                       th:field="*{currentPassword}" 
                       required 
                       placeholder="Entrez votre mot de passe actuel">
            </div>
            
            <div class="form-group">
                <label for="newPassword">Nouveau mot de passe</label>
                <input type="password" 
                       id="newPassword" 
                       th:field="*{newPassword}" 
                       required 
                       minlength="6"
                       placeholder="Minimum 6 caractères">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmer le nouveau mot de passe</label>
                <input type="password" 
                       id="confirmPassword" 
                       th:field="*{confirmPassword}" 
                       required 
                       placeholder="Retapez le nouveau mot de passe">
            </div>
            
            <button type="submit" class="btn">Changer mon mot de passe</button>
        </form>
        
        <a href="/agent/dashboard" class="back-link">← Retour au dashboard</a>
    </div>
</body>
</html>
