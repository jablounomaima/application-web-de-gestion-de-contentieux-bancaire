<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dossiers Contentieux</title>
    <meta charset="UTF-8">

    <style>
        body{
            font-family: Arial;
            margin:40px;
            background:#f5f5f5;
        }

        h2{
            color:#2c3e50;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th,td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#34495e;
            color:white;
        }

        .btn{
            padding:6px 12px;
            text-decoration:none;
            border-radius:4px;
        }

        .btn-detail{
            background:#3498db;
            color:white;
        }

        .btn-create{
            background:#2ecc71;
            color:white;
        }

        .stats{
            margin-bottom:20px;
        }

        .card{
            display:inline-block;
            padding:15px;
            margin-right:15px;
            background:white;
            border-radius:6px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<h2>Gestion des dossiers contentieux</h2>

<p>
    Bonjour <b th:text="${givenName}"></b>
</p>

<div class="stats">

    <div class="card">
        Total dossiers :
        <b th:text="${totalDossiers}"></b>
    </div>

    <div class="card">
        Ouverts :
        <b th:text="${dossiersOuverts}"></b>
    </div>

    <div class="card">
        En attente :
        <b th:text="${dossiersEnAttente}"></b>
    </div>

    <div class="card">
        Validés :
        <b th:text="${dossiersValides}"></b>
    </div>

</div>

<a class="btn btn-create" th:href="@{/agent/dossiers/create}">
    ➕ Créer un dossier
</a>

<br><br>

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Numéro dossier</th>
    <th>Client</th>
    <th>Statut</th>
    <th>Date création</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="dossier : ${dossiers}">

    <td th:text="${dossier.id}"></td>

    <td th:text="${dossier.numeroDossier}"></td>

    <td th:text="${dossier.client.nom}"></td>

    <td th:text="${dossier.statut}"></td>

    <td th:text="${dossier.dateCreation}"></td>

    <td>
        <a class="btn btn-detail"
           th:href="@{/agent/dossiers/{id}(id=${dossier.id})}">
            Voir
        </a>
    </td>

</tr>

</tbody>

</table>

</body>
</html>
