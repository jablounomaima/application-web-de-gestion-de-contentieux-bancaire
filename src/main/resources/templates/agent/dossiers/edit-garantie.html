<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Modifier la garantie</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h2 { color: #2c3e50; margin-bottom: 4px; }
        .subtitle { color: #777; margin-bottom: 24px; font-size: 14px; }
        .card {
            background: white; padding: 28px; border-radius: 6px;
            max-width: 600px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        .card-title {
            font-size: 14px; font-weight: bold; color: #555;
            margin: 0 0 20px; padding-bottom: 8px; border-bottom: 2px solid #eee;
        }
        .form-group { margin-bottom: 16px; }
        label { display:block; font-size:13px; font-weight:bold; color:#555; margin-bottom:6px; }
        input[type="text"], textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 4px; font-size: 14px; font-family: Arial, sans-serif;
        }
        input:focus, textarea:focus {
            outline: none; border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,.1);
        }
        textarea { resize: vertical; min-height: 80px; }
        .actions { display:flex; gap:10px; margin-top:20px; }
        .btn { padding:10px 20px; border-radius:4px; font-size:14px;
               cursor:pointer; border:none; text-decoration:none; display:inline-block; }
        .btn-save { background:#2ecc71; color:white; }
        .btn-back { background:#777; color:white; }
        .alert { padding:12px 16px; border-radius:4px; margin-bottom:16px; }
        .alert-error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    </style>
</head>
<body>

<h2>Modifier la garantie</h2>
<p class="subtitle">Agent connecté : <b sec:authentication="name">–</b></p>

<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

<div class="card">
    <div class="card-title">Informations de la garantie</div>

    <form th:action="@{/agent/dossiers/garanties/{gId}/edit(gId=${garantie.id})}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>Type de garantie <span style="color:red">*</span></label>
            <input type="text" name="typeGarantie"
                   th:value="${garantie.typeGarantie}"
                   required placeholder="Ex: Hypothèque"/>
        </div>

        <div class="form-group">
            <label>Valeur estimée (DT)</label>
            <input type="text" name="valeurEstimee"
                   th:value="${garantie.valeurEstimee}"
                   placeholder="0.00"/>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description"
                      th:text="${garantie.description}"
                      placeholder="Description (optionnel)"></textarea>
        </div>

        <div class="form-group">
            <label>Référence document</label>
            <input type="text" name="documentRef"
                   th:value="${garantie.documentRef}"
                   placeholder="Référence document (optionnel)"/>
        </div>

        <div class="actions">
            <button class="btn btn-save" type="submit">💾 Enregistrer</button>
            <a class="btn btn-back"
               th:href="@{/agent/dossiers/{id}/edit(id=${dossierId})}">
                ← Annuler
            </a>
        </div>
    </form>
</div>

</body>
</html>
