<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes missions</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 40px;
               background: #f5f5f5; color: #333; }
        h2 { color: #1e3a5f; }
        .card { background: white; border-radius: 8px; padding: 24px;
                box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:11px 14px; border-bottom:1px solid #eee;
                text-align:left; font-size:13px; }
        th { background:#1e3a5f; color:white; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px;
                 font-size:11px; font-weight:bold; }
        .badge-ASSIGNEE        { background:#fef3c7; color:#92400e; }
        .badge-EN_COURS        { background:#dbeafe; color:#1e40af; }
        .badge-PV_SOUMIS       { background:#e0e7ff; color:#3730a3; }
        .badge-FACTURE_SOUMISE { background:#fce7f3; color:#9d174d; }
        .badge-TERMINEE        { background:#d1fae5; color:#065f46; }
        .btn { padding:7px 14px; border-radius:4px; text-decoration:none;
               font-size:13px; color:white; background:#2563eb; }
        .empty { color:#aaa; font-style:italic; text-align:center; padding:30px; }
    </style>
</head>
<body>

<h2>📌 Mes Missions</h2>

<div class="card">
    <table>
        <thead>
        <tr>
            <th>N° Mission</th>
            <th>Dossier</th>
            <th>Client</th>
            <th>Description</th>
            <th>Statut</th>
            <th>Date fin prévue</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${missions == null or missions.empty}">
            <td colspan="7" class="empty">Aucune mission assignée.</td>
        </tr>
        <tr th:each="m : ${missions}">
            <td th:text="${m.numeroMission}"></td>
            <td th:text="${m.prestation.dossier.numeroDossier}"></td>
            <td th:text="${m.prestation.dossier.client.nom
                          + ' ' + m.prestation.dossier.client.prenom}"></td>
            <td th:text="${m.description ?: '–'}"></td>
            <td>
                <span class="badge"
                      th:classappend="'badge-' + ${m.statut}"
                      th:text="${m.statut.getLibelle()}"></span>
            </td>
            <td th:text="${m.dateFinPrevue != null
                          ? #temporals.format(m.dateFinPrevue,'dd/MM/yyyy')
                          : '–'}"></td>
            <td>
                <a class="btn"
                   th:href="@{/prestataire/missions/{id}(id=${m.id})}">
                    👁 Voir
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
