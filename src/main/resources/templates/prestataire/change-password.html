<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Changer le mot de passe</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 100%; max-width: 440px; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1e3a5f, #2d5282); padding: 28px 32px; color: white; }
        .card-header h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
        .card-header p  { font-size: 13px; color: rgba(255,255,255,.6); margin: 0; }
        .card-body { padding: 28px 32px; }
        .alert { padding: 11px 14px; border-radius: 7px; margin-bottom: 18px; font-size: 13px; font-weight: 500; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #334155; }
        .input-wrap { position: relative; }
        input[type=password], input[type=text] { width: 100%; padding: 10px 40px 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; box-sizing: border-box; transition: border-color .15s, box-shadow .15s; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .toggle-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #94a3b8; padding: 0; }
        .toggle-eye:hover { color: #2563eb; }
        .field-hint  { font-size: 11px; color: #94a3b8; }
        .field-error { font-size: 11px; color: #dc2626; display: none; }
        .field-error.show { display: block; }
        .strength-bar { height: 4px; border-radius: 2px; background: #e2e8f0; margin-top: 6px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
        .strength-label { font-size: 11px; margin-top: 3px; }
        .btn-group { display: flex; gap: 10px; margin-top: 24px; }
        .btn { flex: 1; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; text-decoration: none; text-align: center; }
        .btn-primary   { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f1f5f9; color: #334155; border: 1.5px solid #cbd5e1; }
        .btn-secondary:hover { background: #e2e8f0; }
        .rules { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 12px 14px; margin-bottom: 16px; }
        .rules p { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #64748b; margin: 0 0 8px; }
        .rule { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: #94a3b8; margin-bottom: 4px; transition: color .2s; }
        .rule.ok { color: #059669; }
        .rule .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; transition: background .2s; }
        .rule.ok .dot { background: #059669; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>🔐 Changer le mot de passe</h1>
        <p>Choisissez un mot de passe sécurisé</p>
    </div>
    <div class="card-body">

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

        <form th:action="@{/prestataire/change-password}" method="post" id="pwdForm" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Mot de passe actuel -->
            <div class="form-group">
                <label>Mot de passe actuel</label>
                <div class="input-wrap">
                    <input type="password" id="currentPassword" name="currentPassword"
                           placeholder="Votre mot de passe actuel" required/>
                    <button type="button" class="toggle-eye" onclick="toggleVisibility('currentPassword')">👁</button>
                </div>
                <span class="field-error" id="err-current">Mot de passe actuel requis</span>
            </div>

            <!-- Nouveau mot de passe -->
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <div class="input-wrap">
                    <input type="password" id="newPassword" name="newPassword"
                           placeholder="Minimum 8 caractères" required
                           oninput="checkStrength(this.value); checkRules(this.value)"/>
                    <button type="button" class="toggle-eye" onclick="toggleVisibility('newPassword')">👁</button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="strength-label" id="strengthLabel"></div>
                <span class="field-error" id="err-new">Minimum 8 caractères requis</span>
            </div>

            <!-- Règles -->
            <div class="rules">
                <p>Le mot de passe doit contenir</p>
                <div class="rule" id="r-len"><span class="dot"></span> Au moins 8 caractères</div>
                <div class="rule" id="r-upper"><span class="dot"></span> Une lettre majuscule</div>
                <div class="rule" id="r-num"><span class="dot"></span> Un chiffre</div>
                <div class="rule" id="r-special"><span class="dot"></span> Un caractère spécial (@, #, !, ...)</div>
            </div>

            <!-- Confirmation -->
            <div class="form-group">
                <label>Confirmer le nouveau mot de passe</label>
                <div class="input-wrap">
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Répétez le nouveau mot de passe" required
                           oninput="checkMatch()"/>
                    <button type="button" class="toggle-eye" onclick="toggleVisibility('confirmPassword')">👁</button>
                </div>
                <span class="field-error" id="err-confirm">Les mots de passe ne correspondent pas</span>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary" onclick="return validateForm()">
                    💾 Enregistrer
                </button>
                <a th:href="@{/prestataire/dashboard}" class="btn btn-secondary">❌ Annuler</a>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleVisibility(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(pwd) {
        const fill  = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (pwd.length >= 8)            score++;
        if (/[A-Z]/.test(pwd))          score++;
        if (/[0-9]/.test(pwd))          score++;
        if (/[^A-Za-z0-9]/.test(pwd))   score++;

        const levels = [
            { w: '0%',   bg: '#e2e8f0', txt: '' },
            { w: '25%',  bg: '#ef4444', txt: '🔴 Très faible' },
            { w: '50%',  bg: '#f97316', txt: '🟠 Faible' },
            { w: '75%',  bg: '#eab308', txt: '🟡 Moyen' },
            { w: '100%', bg: '#22c55e', txt: '🟢 Fort' },
        ];
        fill.style.width      = levels[score].w;
        fill.style.background = levels[score].bg;
        label.textContent     = levels[score].txt;
        label.style.color     = levels[score].bg;
    }

    function checkRules(pwd) {
        const rules = {
            'r-len':     pwd.length >= 8,
            'r-upper':   /[A-Z]/.test(pwd),
            'r-num':     /[0-9]/.test(pwd),
            'r-special': /[^A-Za-z0-9]/.test(pwd),
        };
        Object.entries(rules).forEach(([id, ok]) => {
            document.getElementById(id).classList.toggle('ok', ok);
        });
    }

    function checkMatch() {
        const np = document.getElementById('newPassword').value;
        const cp = document.getElementById('confirmPassword').value;
        const err = document.getElementById('err-confirm');
        if (cp && np !== cp) err.classList.add('show');
        else err.classList.remove('show');
    }

    function validateForm() {
        let ok = true;
        const current = document.getElementById('currentPassword').value.trim();
        const newPwd  = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!current) { document.getElementById('err-current').classList.add('show'); ok = false; }
        else document.getElementById('err-current').classList.remove('show');

        if (newPwd.length < 8) { document.getElementById('err-new').classList.add('show'); ok = false; }
        else document.getElementById('err-new').classList.remove('show');

        if (newPwd !== confirm) { document.getElementById('err-confirm').classList.add('show'); ok = false; }
        else document.getElementById('err-confirm').classList.remove('show');

        return ok;
    }
</script>
</body>
</html>
