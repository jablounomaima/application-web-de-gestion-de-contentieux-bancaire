<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${titre}">Notifications</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 40px;
               background: #f5f5f5; color: #333; }
        h2 { color: #2c3e50; margin-bottom: 4px; }
        .subtitle { color: #777; margin-bottom: 24px; font-size: 14px; }

        .toolbar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 16px; max-width: 750px;
        }

        .badge-count {
            background: #e74c3c; color: white;
            padding: 3px 10px; border-radius: 12px;
            font-size: 13px; font-weight: bold;
        }

        .btn {
            padding: 8px 16px; border-radius: 4px; font-size: 13px;
            cursor: pointer; border: none; text-decoration: none;
            display: inline-block;
        }
        .btn-back   { background: #777; color: white; }
        .btn-back:hover { background: #555; }

        /* Notification card */
        .notif-card {
            background: white; border-radius: 6px; max-width: 750px;
            padding: 16px 20px; margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            border-left: 4px solid #3498db;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .notif-card.non-lue {
            border-left-color: #e74c3c;
            background: #fff8f8;
        }

        .notif-card.lue {
            border-left-color: #bdc3c7;
            opacity: .85;
        }

        .notif-icon {
            font-size: 28px; margin-right: 16px; flex-shrink: 0;
        }

        .notif-body { flex: 1; }

        .notif-titre {
            font-weight: bold; font-size: 14px; margin-bottom: 4px;
        }

        .notif-message {
            font-size: 13px; color: #555; margin-bottom: 8px; line-height: 1.5;
        }

        .notif-meta {
            font-size: 12px; color: #aaa;
        }

        .notif-actions {
            display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
        }

        .btn-voir {
            background: #3498db; color: white;
            padding: 6px 14px; border-radius: 4px;
            font-size: 13px; text-decoration: none;
        }
        .btn-voir:hover { background: #2980b9; }

        .badge-non-lue {
            background: #e74c3c; color: white;
            font-size: 11px; padding: 2px 8px;
            border-radius: 10px; margin-left: 8px;
        }

        .empty-state {
            max-width: 750px; text-align: center;
            padding: 60px 20px; color: #aaa;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>

<h2 th:text="${titre}">Notifications</h2>
<p class="subtitle">
    Connecté : <b sec:authentication="name">–</b>
</p>

<div class="toolbar">
    <div>
        <!-- Badge nombre non lues -->
        <span th:if="${notifications != null}"
              th:with="nonLues=${#lists.size(notifications.?[!lue])}">
            <span th:if="${nonLues > 0}" class="badge-count"
                  th:text="${nonLues} + ' non lue(s)'">
            </span>
            <span th:unless="${nonLues > 0}"
                  style="font-size:13px;color:#27ae60">
                ✅ Tout lu
            </span>
        </span>
    </div>
    <a class="btn btn-back" th:href="${retourUrl}">← Retour aux dossiers</a>
</div>

<!-- ── Liste des notifications ── -->
<div th:if="${notifications != null and !notifications.empty}">
    <div th:each="n : ${notifications}"
         class="notif-card"
         th:classappend="${n.lue} ? ' lue' : ' non-lue'">

        <!-- Icône selon type -->
        <div class="notif-icon">
            <span th:if="${n.type == 'VALIDATION_FINANCIERE'}">💰</span>
            <span th:if="${n.type == 'VALIDATION_JURIDIQUE'}">⚖️</span>
            <span th:unless="${n.type == 'VALIDATION_FINANCIERE'
                               or n.type == 'VALIDATION_JURIDIQUE'}">🔔</span>
        </div>

        <div class="notif-body">
            <div class="notif-titre">
                <span th:text="${n.titre}"></span>
                <span th:unless="${n.lue}" class="badge-non-lue">Nouveau</span>
            </div>

            <div class="notif-message" th:text="${n.message}"></div>

            <div class="notif-meta">
                🕐
                <span th:text="${#temporals.format(n.dateCreation, 'dd/MM/yyyy HH:mm')}"></span>
                &nbsp;|&nbsp;
                Dossier :
                <b th:text="${n.dossier != null ? n.dossier.numeroDossier : '–'}"></b>
            </div>

            <div class="notif-actions">
                <!-- Lien vers le dossier -->
                <a class="btn-voir"
                   th:href="${n.urlAction}">
                    👁 Voir le dossier
                </a>
            </div>
        </div>
    </div>
</div>

<!-- ── État vide ── -->
<div th:unless="${notifications != null and !notifications.empty}"
     class="empty-state">
    <div class="icon">🔔</div>
    <div>Aucune notification pour le moment.</div>
</div>

</body>
</html>
