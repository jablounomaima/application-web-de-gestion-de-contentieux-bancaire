<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - SGCB</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🏦 Connexion SGCB</h2>
        
        <!-- Message de succès/erreur -->
        <div th:if="${message}" 
             th:classappend="${messageType == 'success'} ? 'alert-success' : 'alert-error'"
             class="alert">
            <span th:text="${message}"></span>
        </div>
        
        <!-- Bouton de connexion via Keycloak -->
        <form th:action="@{/oauth2/authorization/keycloak}" method="get">
            <button type="submit" class="btn-login">
                🔐 Se connecter avec Keycloak
            </button>
        </form>
    </div>
</body>
</html>
