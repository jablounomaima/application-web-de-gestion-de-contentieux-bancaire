spring.application.name=contentieux-security

# --- Server Config ---
server.port=8097

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true

# --- Security (Keycloak OAuth2 Client) ---
# Configuration pour login via Keycloak (OAuth2 Client)
spring.security.oauth2.client.registration.keycloak.client-id=contentieux-client2
spring.security.oauth2.client.registration.keycloak.client-secret=ZXU1FvilGvXQCh5YUp9bPtfYkaAvkupZ
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8097/login/oauth2/code/keycloak

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://127.0.0.1:8080/realms/contentieux-realm
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# JWT Resource Server (pour API REST sécurisée)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:8080/realms/contentieux-realm

# --- Database (MySQL / XAMPP) ---
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/contentieux_db11?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# --- JPA / Hibernate Config ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Keycloak Admin Config ---
keycloak.admin.server-url=http://127.0.0.1:8080
keycloak.admin.realm=master
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=admin-cli

# Target Realm for Users
keycloak.target.realm=contentieux-realm


spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}